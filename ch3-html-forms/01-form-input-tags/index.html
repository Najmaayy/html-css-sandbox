<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labels and Text Input</title>
</head>


<body>
    <h1>Labels and Text Input</h1>


    <!--Single line text-base input-->
    <!--Name Textfield-->
<form action="">
    <div>
        <label for="name">Name</label>
        <input

          type="text"
          id="name"
          placeholder="Enter name"
          name="name"
          required
          minlength="3"
          maxlength="10"
    
     </div>
    
    <br>
    
    <!--Email Textfield-->
    <div>
        <label for="email">Email</label>
        <input type="email"
                id="email"
                placeholder="Enter email"
                name="email"
                value="text@test.com"
                required
                disabled
                
                />
    
    </div>
    
    <br>
    <!--Password textfield-->
    <div>
        <label for="password">Password</label>
        <input
         type="password"
         id="password"
         placeholder="Enter password"
         name="name" 
         required 
         />
    
    </div>
    
    <div>
        <input type="submit" value="Submit">
    </div>
    <!--<button type="submit"></button> -->
    
    
    </body>
    </html>
</form>
