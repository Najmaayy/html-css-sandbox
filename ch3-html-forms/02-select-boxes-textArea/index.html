<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Boxes and TextAreas</title>
</head>
<body>
    
    <h1>Tech Support</h1>


    <form>
        <label for="product">Product</label>
        <br>
        <select name="product" id="product" multiple size="2">
          <option value="iphone">Iphone</option>
          <option value="iphone" selected>iMac</option>
          <option value="iphone">MacBook</option>
          <option value="iphone">MacBook Pro</option>
    </select>

    <br>
    <br>

    <label for="message">Message</label>
    <br>
    <textarea 
      name="message" 
      id="message"
      placeholder="Enter your issue"
      rows="4"
      cols="50"
    ></textarea>
    <input type="submit" value="submit">
    </form>
</body>
</html>
