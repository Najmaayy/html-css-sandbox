<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox and Radio</title>
</head>
<body>
    <h1>Favorite Programming Languages</h1>

    <label for="html">
        <input 
         type="checkbox" 
         name="Languages" 
         id="html" 
         value="html"> HTML
    </label>

    <label for="css">
        <input 
         type="checkbox" 
         name="Languages" 
         id="css" 
         value="css"> CSS
    </label>

    <label for="javascript">
        <input 
         type="checkbox" 
         name="Languages" 
         id="javascript" 
         value="javascript"> Javascript
    </label>


</body>
</html>
