<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Map</title>
</head>
<body>
    <h1>Image Map</h1>
    <img src="./cute_cat.jpg" 
         alt="A cute cat" 
         usemap="#cutecatmap"
         width="400"
         height="300">

<map name="cutecatmap">

      <area shape="rect" 
            coords="34,44,270,350" 
            href="cute_cat.html" 
            alt="cat" />

        <area shape="rect" 
              coords="290,172,333,250" 
              href="cat.html" 
              alt="more little cats">



</map>
    
</body>
</html>
