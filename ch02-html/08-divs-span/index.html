<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS SandBox</title>
</head>
<body>

    <!--We are breaking content into parts however we haven't used css so 
        we wont see some parts at the moment e.g span-->

    <!--Header-->
    <div> 
        <h1>My website</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>

    <!--Sections-->

    <div class = "card-text-center">

        <h2 class = "text-lg">Section One</h2>
        <p>This is paragraph one in <span>section one </span></p>
        <p>This is paragraph two in section one</p>

    </div>
   
     <div>
    
        <h2 class = "text-xl">Section Two</h2>
        <p>This is paragraph one in section two</p>
        <p>This is paragraph two in section two</p>

    </div>

    <!--Footer-->

    <div> &copy; 2026 My Website </div>
  

    
</body>
</html>
