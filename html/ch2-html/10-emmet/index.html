<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmet</title>
</head>
<body>

    <!--Use the emmet cheat sheet-->
<!-- Basic Tag -->
<!-- h1 -->
<h1></h1>

<!-- Tag with text -->
<h1>Hello</h1>
<!-- h1{Hello} -->

<!-- Class -->
<div class="box"></div>
<!-- .box  OR  div.box -->

<div class="box shadow large"></div>
<!-- Multiple Classes -->
<!-- div.box.shadow.large -->

<!-- ID -->
<div id="main"></div>
<!-- #main  OR  div#main -->

<!-- ID + Class -->
<div id="card" class="box"></div>
<!-- div#card.box -->

<!-- Child (inside) -->
<div>
  <p></p>
</div>

<!-- div>p -->

<!-- Multiple Children -->
<div>
  <h2></h2>
  <p></p>
</div>
<!-- div>h2+p -->

<!-- Siblings (same level) -->
<h1></h1>
<p></p>
<!-- h1+p -->

<!-- Multiply -->
<li></li>
<li></li>
<li></li>
<!-- li*3 -->

<!-- Parent > Child > Child -->
<section>
  <div>
    <p></p>
  </div>
</section>
<!-- section>div>p -->

<!-- Grouping -->
<div>
  <h2></h2>
  <p></p>
</div>
<footer></footer>
<!-- (div>h2+p)+footer -->

<!-- Numbering -->
<li>Item 1</li>
<li>Item 2</li>
<li>Item 3</li>
<!-- li{Item $}*3 -->

<!-- Attribute -->
<input type="text" />
<!-- input[type="text"] -->

<!-- Full Example -->
<section id="about" class="container">
  <h2>About</h2>
  <p></p>
  <p></p>
</section>
<!-- section#about.container>h2{About}+p*2 -->


<a href="http://"></a>
<!-- a:link -->

<a href="mailto:"></a>
<!-- a:mail -->

<script src=""></script>
<!-- script:src -->

<link rel="stylesheet" href="">
<!-- link:css -->

<input type="text">
<!-- input:text -->

<input type="email">
<!-- input:email -->

<input type="password">
<!-- input:password -->

<button type="submit"></button>
<!-- button:submit -->

</html>

</body>
