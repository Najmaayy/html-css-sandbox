<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS Sandbox</title>
</head>
<body>
    <h1>Line Breaks, Horizontal Rules & Entities</h1>

    <!--Line Break-->
    <!--Creates a new line without starting a new paragraph.-->

    hello <br> world

    <!--Horizontal Rule-->
    <!--Creates a horizontal line across 
    the page. Used to separate sections.-->

    <h2>My Website</h2>
    <hr>
    <p>This is the first section.</p>

    <!--Pre-tag-->
    <!--Shows the text exactly as I typed it-->

    <pre>
      Hello      world
      How are you?
</pre>

<!--<code> is an inline HTML tag used to show
     small pieces of code inside text.-->

     <p>Use <code>console.log()</code> to print output.</p>

     <!--Pre+Code-->

     <pre>
  <code>
let name = "John";
console.log(name);
  </code>
</pre>

<!--HTML Entities-->

<!--HTML entities are special codes used to 
display reserved or special characters in 
HTML.-->

<p>5 < 10</p>
<p>5 &lt; 10</p>



</body>
</html>
