<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio</title>
</head>
<body>
<!-- 
    The <audio> tag is used to embed sound or music in a webpage.
    It allows users to play audio directly in the browser. -->
    
<!-- <audio src="./youtube_audio.mp3" type="audio/mp3" controls ></audio>
     -->


      <audio controls>
        <source src="youtube_audio.mp3" type="audio/mpeg">
   
     FallBack
     <p>Your browser does not support the audio element</p>
   </audio>

   <!-- Autoplay -->
    <!-- <audio src="./youtube_audio.mp3" autoplay ></audio> -->

     <!-- Loops -->
    <!-- <audio src="./youtube_audio.mp3" autoplay loops ></audio> -->

    <!-- Fig and figcaption -->
    
    <figure>
        <figcaption>Listen to the song</figcaption>
        <audio src="./youtube_audio.mp3" controls ></audio>
        <a href="./"></a>
    </figure>
    </body>
</html>
